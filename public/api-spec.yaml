openapi: 3.0.3
info:
  title: DocGen Engine API
  description: |
    REST API for generating PDF business documents from DOCX templates and JSON data.
    
    ### Features
    - Scan DOCX templates to detect fields
    - Generate PDF from DOCX with data injection
    - Watermark support
    - Scan PDF files to extract structured data
  version: 1.0.0
  contact:
    name: DocGen Support
    url: https://github.com/fikriaf/DocGen
servers:
  - url: https://docgen-production-503d.up.railway.app/api/v1
    description: Production Server
  - url: http://localhost:3000/api/v1
    description: Development Server

tags:
  - name: Generation
    description: Document generation endpoints
  - name: Scanning
    description: Document scanning and field extraction

paths:
  /docx/scan:
    post:
      tags:
        - Scanning
      summary: Scan DOCX template for fields
      description: |
        Upload a DOCX file to automatically detect all variables/fields that need to be filled.
        
        Supports both explicit markers like `{{field_name}}` and can use AI to detect
        fields from plain text documents.
        
        ### Example (cURL)
        ```bash
        curl -X POST -F "file=@template.docx" http://localhost:3000/api/v1/docx/scan
        ```
      operationId: scanDocxTemplate
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: DOCX file to scan
      responses:
        '200':
          description: Fields detected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  fields:
                    type: array
                    items:
                      type: string
                    example:
                      - invoice_no
                      - client_name
                      - total_amount

  /docx/generate:
    post:
      tags:
        - Generation
      summary: Generate PDF from DOCX template
      description: |
        Upload a DOCX template and inject JSON data to generate a PDF.
        
        - Injects payload JSON into DOCX variables
        - Converts DOCX to PDF using LibreOffice
        - Optionally applies watermark
      operationId: generateDocxTemplate
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - payload
              properties:
                file:
                  type: string
                  format: binary
                  description: DOCX template file (e.g., Master_Caesar.docx)
                payload:
                  type: object
                  description: JSON object containing field values to inject
                options:
                  type: object
                  description: JSON object for options (smartReplace, filename, watermark)
            encoding:
              payload:
                contentType: application/json
              options:
                contentType: application/json
            examples:
              Master_Caesar:
                summary: Master Caesar Example
                value:
                  file: (binary DOCX file)
                  payload:
                    invoice_no: "INV-2026-MCT999"
                    invoice_date: "15 Maret 2026"
                    due_date: "20 Maret 2026"
                    client_name: "PT. Budi Sempurna"
                    client_address: "Gedung Cyber, Lt 2, Jakarta Selatan"
                    client_number: "+62 812 3456 7890"
                    item_name: "Pengembangan Sistem Integrasi API Backend"
                    item_quantity: "1"
                    item_price_per_unit: "50.000.000"
                    item_amount: "50.000.000"
                    payment_bank: "BCA"
                    payment_name_bank: "ANTON SUPRIADI"
                    number_bank: "1234567890"
                    summary_subtotal: "50.000.000"
                    summary_vat: "5.500.000"
                    total_due: "55.500.000"
                  options:
                    smartReplace: false
                    filename: "Invoice_Budi"
                    watermark:
                      enabled: true
                      text: "LUNAS"
      responses:
        '200':
          description: PDF generated successfully
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid request

  /scan:
    post:
      tags:
        - Scanning
      summary: Scan PDF for fields
      description: |
        Upload a PDF to extract fields via pattern matching or OCR.
        
        Uses regex for text-based PDFs or OCR + LLM for image-based PDFs.
        
        ### Example (cURL)
        ```bash
        curl -X POST -F "file=@document.pdf" http://localhost:3000/api/v1/scan
        ```
      operationId: scanDocument
      parameters:
        - name: templateId
          in: query
          required: false
          schema:
            type: string
            default: _generic
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to scan
      responses:
        '200':
          description: Fields extracted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  extracted:
                    type: object
                  confidence:
                    type: object
