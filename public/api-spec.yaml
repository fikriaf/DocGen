openapi: 3.0.3
info:
  title: DocGen Engine API
  description: |
    REST API for generating PDF business documents from DOCX templates and JSON data.
    
    ### Features
    - Scan DOCX templates to detect fields
    - Generate PDF from DOCX with data injection
    - Watermark support
    - Scan PDF files to extract structured data
  version: 1.0.0
  contact:
    name: DocGen Support
    url: https://github.com/fikriaf/DocGen
servers:
  - url: https://docgen-production-503d.up.railway.app/api/v1
    description: Production Server
  - url: http://localhost:3000/api/v1
    description: Development Server

tags:
  - name: Generation
    description: Document generation endpoints
  - name: Scanning
    description: Document scanning and field extraction

paths:
  /docx/scan:
    post:
      tags:
        - Scanning
      summary: Scan DOCX template for fields
      description: |
        Upload a DOCX file to automatically detect all variables/fields that need to be filled.
        
        Supports both explicit markers like `{{field_name}}` and can use AI to detect
        fields from plain text documents.
        
        ### Example (cURL)
        ```bash
        curl -X POST -F "file=@template.docx" http://localhost:3000/api/v1/docx/scan
        ```
      operationId: scanDocxTemplate
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: DOCX file to scan
      responses:
        '200':
          description: Fields detected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  fields:
                    type: array
                    items:
                      type: string
                    example:
                      - invoice_no
                      - client_name
                      - total_amount

  /docx/generate:
    post:
      tags:
        - Generation
      summary: Generate PDF from DOCX template
      description: |
        Upload a DOCX template and inject JSON data to generate a PDF.
        
        - Injects payload JSON into DOCX variables
        - Converts DOCX to PDF using LibreOffice
        - Optionally applies watermark
        
        ### Example (cURL)
        ```bash
        curl -X POST           -F "file=@template.docx"           -F "payload={\"client_name\": \"Budi\", \"total\": \"Rp 500.000\"}"           -F "options={\"filename\": \"Invoice_Budi\"}"           http://localhost:3000/api/v1/docx/generate --output result.pdf
        ```
        
        ### Example (Node.js / Axios)
        ```javascript
        const axios = require('axios');
        const FormData = require('form-data');
        const fs = require('fs');

        const form = new FormData();
        form.append('file', fs.createReadStream('template.docx'));
        
        // Data to fill in the DOCX {{ }} placeholders
        form.append('payload', JSON.stringify({
          client_name: "Budi Santoso",
          total: "Rp 500.000"
        }));
        
        // Optional settings
        form.append('options', JSON.stringify({
          filename: "Invoice_Budi",
          smartReplace: false,
          watermark: {
            enabled: true,
            text: "DRAFT",
            color: "#FF0000"
          }
        }));

        axios.post('https://docgen-production-503d.up.railway.app/api/v1/docx/generate', form, {
          responseType: 'arraybuffer' // Important to receive PDF file
        }).then(res => {
          fs.writeFileSync('result.pdf', res.data);
        });
        ```
      operationId: generateDocxTemplate
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - payload
              properties:
                file:
                  type: string
                  format: binary
                  description: DOCX template file (e.g., invoice_template.docx)
                payload:
                  type: string
                  description: JSON string containing field values to inject
                  example: |
                    {
                      "invoice_no": "INV-2026-001",
                      "client_name": "John Doe",
                      "date": "2026-03-13"
                    }
                options:
                  type: string
                  description: JSON string for options (smartReplace, filename, watermark)
                  example: |
                    {
                      "smartReplace": false,
                      "filename": "Invoice_Budi",
                      "watermark": {
                        "enabled": true,
                        "text": "LUNAS"
                      }
                    }
      responses:
        '200':
          description: PDF generated successfully
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid request

  /scan:
    post:
      tags:
        - Scanning
      summary: Scan PDF for fields
      description: |
        Upload a PDF to extract fields via pattern matching or OCR.
        
        Uses regex for text-based PDFs or OCR + LLM for image-based PDFs.
        
        ### Example (cURL)
        ```bash
        curl -X POST -F "file=@document.pdf" http://localhost:3000/api/v1/scan
        ```
      operationId: scanDocument
      parameters:
        - name: templateId
          in: query
          required: false
          schema:
            type: string
            default: _generic
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to scan
      responses:
        '200':
          description: Fields extracted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  extracted:
                    type: object
                  confidence:
                    type: object
